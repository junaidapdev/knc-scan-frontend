<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Page identity -->
    <title>Kayan Sweets — Loyalty Card</title>
    <meta
      name="description"
      content="Your Kayan Sweets loyalty card. Earn a stamp on every visit, claim a free dessert at 10."
    />
    <link rel="canonical" href="https://scan.kayansweets.com/" />

    <!-- PWA / icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0D0D0D" />

    <!-- iOS PWA install behaviour. With these set, when the customer adds
         the app to their home screen, it launches in a chromeless window
         (no Safari address bar) and gets a brand-coloured status bar. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kayan" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph (used by WhatsApp, iMessage, Slack, Facebook…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kayan Sweets" />
    <meta property="og:title" content="Kayan Sweets — Loyalty Card" />
    <meta
      property="og:description"
      content="Your Kayan Sweets loyalty card. Earn a stamp on every visit, claim a free dessert at 10."
    />
    <meta property="og:url" content="https://scan.kayansweets.com/" />
    <meta property="og:image" content="https://scan.kayansweets.com/icons/icon-512.svg" />
    <meta property="og:locale" content="ar_SA" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Kayan Sweets — Loyalty Card" />
    <meta
      name="twitter:description"
      content="Your Kayan Sweets loyalty card. Earn a stamp on every visit, claim a free dessert at 10."
    />
    <meta name="twitter:image" content="https://scan.kayansweets.com/icons/icon-512.svg" />

    <!-- Brand typography:
         · Plus Jakarta Sans (UI / display — 400/500/700/800)
         · JetBrains Mono (numeric / codes)
         · Noto Naskh Arabic (Arabic body + ١٠ brand glyph)
         · Bebas Neue + DM Sans + Space Mono kept loaded for legacy screens
           that haven't been migrated to the v2 system yet. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
