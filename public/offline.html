<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D0D0D" />
    <title>Offline — Kayan Sweets</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: #f7f7f5;
        color: #0d0d0d;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto,
          'Noto Sans Arabic', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: #ffffff;
        border: 0.5px solid rgba(13, 13, 13, 0.1);
        border-radius: 12px;
        padding: 32px 24px;
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      .brand {
        font-family: Impact, 'Bebas Neue', sans-serif;
        font-size: 28px;
        letter-spacing: 4px;
      }
      h1 {
        font-size: 22px;
        margin: 16px 0 8px;
      }
      p {
        color: rgba(13, 13, 13, 0.7);
        font-size: 14px;
        line-height: 1.6;
        margin: 0 0 4px;
      }
      button {
        margin-top: 24px;
        background: #ffd700;
        color: #0d0d0d;
        border: none;
        font-weight: 600;
        font-size: 15px;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
      }
      button:hover {
        background: #f5c200;
      }
      button:focus-visible {
        outline: 2px solid #ffd700;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">KAYAN</div>
      <h1>You're offline</h1>
      <p>Check your connection and try again.</p>
      <p lang="ar" dir="rtl">لا يوجد اتصال بالإنترنت. تحقق من اتصالك وحاول مرة أخرى.</p>
      <button type="button" onclick="window.location.reload()">
        Try again / حاول مرة أخرى
      </button>
    </main>
  </body>
</html>
